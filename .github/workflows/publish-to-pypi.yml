name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # Ermöglicht manuellen Start

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Check if version already on PyPI
      id: check_pypi
      run: |
        VERSION=$(python -c "import tomllib; f=open('pyproject.toml','rb'); d=tomllib.load(f); print(d['project']['version'])")
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pypi.org/pypi/controme-scraper/${VERSION}/json)
        if [ "$STATUS" = "200" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Version $VERSION already on PyPI — skipping upload."
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Version $VERSION not on PyPI — will upload."
        fi

    - name: Publish to PyPI
      if: steps.check_pypi.outputs.exists == 'false'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: twine upload dist/*
